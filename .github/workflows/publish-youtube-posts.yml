name: Publish YouTube Posts

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Publish YouTube posts
        env:
          WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          YOUTUBE_57STORE_CHANNEL_ID: ${{ secrets.YOUTUBE_57STORE_CHANNEL_ID }}
          YOUTUBE_FIVSEVN_CHANNEL_ID: ${{ secrets.YOUTUBE_FIVSEVN_CHANNEL_ID }}
        run: python scripts/publish_youtube_posts.py
